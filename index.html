<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta Digital</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
}

header{
  background:#111;
  color:white;
  padding:15px;
  text-align:center;
}

.search-box{
  display:flex;
  gap:10px;
  padding:15px;
  background:white;
  position:sticky;
  top:0;
  z-index:10;
}

.search-box input{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.search-box button{
  padding:10px 15px;
  border:none;
  background:#111;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.categorias{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
  background:#eee;
}

.categorias button{
  padding:8px 12px;
  border:none;
  background:#111;
  color:white;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

.productos{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:white;
  border-radius:12px;
  padding:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  margin:10px 0 5px;
}

.card p{
  margin:0;
  font-size:14px;
  color:#555;
}

.precio{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>
<body>

<header>
  <h1>Nuestra Carta</h1>
</header>

<div class="search-box">
  <input id="search" type="text" placeholder="Buscar...">
  <button id="btnSearch">Buscar</button>
</div>

<div class="categorias" id="categorias"></div>

<div class="productos" id="productos"></div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  /* UNIVERSAL GITHUB */
  const USER = location.hostname.split('.')[0];
  const REPO = location.pathname.split('/')[1];

  const DATA_URL = `https://${USER}.github.io/${REPO}/productos.json`;

  const contenedor = document.getElementById("productos");
  const contCategorias = document.getElementById("categorias");
  const searchInput = document.getElementById("search");
  const btnSearch = document.getElementById("btnSearch");

  let productos = [];

  function normalizar(texto){
    return texto
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g,"");
  }

  function scrollToProducts(){
    contenedor.scrollIntoView({behavior:"smooth"});
  }

  function render(lista){

    contenedor.innerHTML="";

    if(lista.length===0){
      contenedor.innerHTML="<p>No se encontraron productos</p>";
      return;
    }

    lista.forEach(p=>{

      const card=document.createElement("div");
      card.className="card";

      card.innerHTML=`
        ${p.imagen ? `<img src="${p.imagen}" alt="${p.nombre}">` : ""}
        <h3>${p.nombre}</h3>
        <p>${p.descripcion || ""}</p>
        <div class="precio">$${p.precio}</div>
      `;

      contenedor.appendChild(card);
    });
  }

  function crearCategorias(){
    const categoriasUnicas=[...new Set(productos.map(p=>p.categoria))];

    contCategorias.innerHTML="";

    categoriasUnicas.forEach(cat=>{
      const btn=document.createElement("button");
      btn.textContent=cat;
      btn.onclick=()=>{
        const filtrados=productos.filter(p=>p.categoria===cat);
        render(filtrados);
        scrollToProducts();
      };
      contCategorias.appendChild(btn);
    });
  }

  function filtrar(){
    const texto=normalizar(searchInput.value);

    return productos.filter(p=>{
      return (
        normalizar(p.nombre||"").includes(texto) ||
        normalizar(p.descripcion||"").includes(texto) ||
        normalizar(p.categoria||"").includes(texto)
      );
    });
  }

  /* Buscar mientras escribe (NO baja) */
  searchInput.addEventListener("input",()=>{
    render(filtrar());
  });

  /* Botón Buscar (baja) */
  btnSearch.addEventListener("click",()=>{
    render(filtrar());
    scrollToProducts();
  });

  /* Enter baja */
  searchInput.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
      render(filtrar());
      scrollToProducts();
    }
  });

  try{
    const res=await fetch(DATA_URL);
    productos=await res.json();
    render(productos);
    crearCategorias();
  }catch(error){
    contenedor.innerHTML="<p>Error cargando productos</p>";
    console.error(error);
  }

});
</script>

</body>
</html>
