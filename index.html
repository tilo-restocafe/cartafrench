<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta Digital</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

header {
  padding: 20px;
  background: #111;
  color: white;
  text-align: center;
}

.search-box {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 15px;
}

.search-box input {
  padding: 8px;
  width: 250px;
}

.search-box button {
  padding: 8px 14px;
  cursor: pointer;
}

#productos {
  padding: 20px;
  display: grid;
  gap: 15px;
}

.card {
  border: 1px solid #ddd;
  padding: 15px;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>
  <h1>Nuestra Carta</h1>
</header>

<div class="search-box">
  <input id="search" type="text" placeholder="Buscar...">
  <button id="btnSearch">Buscar</button>
</div>

<div id="productos"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* UNIVERSAL GITHUB */
  const USER = location.hostname.split('.')[0];
  const REPO = location.pathname.split('/')[1];
  const URL = `https://raw.githubusercontent.com/${USER}/${REPO}/main/productos.json`;

  const searchInput = document.getElementById("search");
  const btnSearch = document.getElementById("btnSearch");
  const contenedor = document.getElementById("productos");

  let productos = [];

  function normalizar(texto) {
    return texto
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");
  }

  function render(lista) {
    contenedor.innerHTML = "";

    if (lista.length === 0) {
      contenedor.innerHTML = "<p>No se encontraron productos</p>";
      return;
    }

    lista.forEach(p => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h3>${p.nombre}</h3>
        <p>${p.descripcion || ""}</p>
        <strong>$${p.precio}</strong>
      `;
      contenedor.appendChild(card);
    });
  }

  function filtrarProductos() {
    const texto = normalizar(searchInput.value);

    return productos.filter(p => {
      const nombre = normalizar(p.nombre || "");
      const descripcion = normalizar(p.descripcion || "");
      const categoria = normalizar(p.categoria || "");

      return (
        nombre.includes(texto) ||
        descripcion.includes(texto) ||
        categoria.includes(texto)
      );
    });
  }

  function scrollToProducts() {
    document.getElementById("productos")
      .scrollIntoView({ behavior: "smooth" });
  }

  /* BUSCA MIENTRAS ESCRIBE (NO BAJA) */
  searchInput.addEventListener("input", () => {
    render(filtrarProductos());
  });

  /* BOTÓN BAJA */
  btnSearch.addEventListener("click", () => {
    render(filtrarProductos());
    scrollToProducts();
  });

  /* ENTER BAJA */
  searchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      render(filtrarProductos());
      scrollToProducts();
    }
  });

  /* CARGAR PRODUCTOS */
  fetch(URL)
    .then(res => res.json())
    .then(data => {
      productos = data;
      render(productos);
    })
    .catch(err => {
      contenedor.innerHTML = "Error cargando productos";
      console.error(err);
    });

});
</script>

</body>
</html>
