<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tilo Café French</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:url("img/Fondo1.jpg") repeat;
  background-size:cover;
  margin:0;
  color:#45270a;
  text-align:center;
}

header img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.banner{
  background:rgba(255,255,255,.85);
  padding:10px;
  font-size:1.3em;
  border-radius:8px;
  display:inline-block;
  margin:10px auto;
}

#languageSwitcher{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px 0;
}

.lang-btn{
  background:#806250;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}

.lang-btn.active{
  background:#a07b68;
}

.search-box{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px;
}

.search-box input{
  padding:10px;
  width:60%;
  border-radius:8px;
  border:1px solid #ccc;
}

.search-box button{
  background:#806250;
  color:white;
  border:none;
  border-radius:8px;
  padding:10px 16px;
  cursor:pointer;
}

#category-buttons{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin:15px;
}

#category-buttons button{
  background:#8c6954;
  color:white;
  border:none;
  border-radius:10px;
  padding:8px 14px;
  cursor:pointer;
}

#product-list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.item{
  background:rgba(255,255,255,.95);
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
  overflow:hidden;
}

.item img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}

.price{
  font-weight:bold;
  margin:8px;
  display:block;
}

.msg{
  padding:20px;
  color:#a00;
}

#btnUp{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#8c6954;
  color:white;
  border:none;
  border-radius:50%;
  width:45px;
  height:45px;
  font-size:22px;
  display:none;
  cursor:pointer;
}
  /* ================= TELEPROMPTER ================= */

#teleprompter{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:rgba(0,0,0,.92);
  color:#fff;
  z-index:2000;
  padding:12px 16px;
  font-family:'Playfair Display',serif;
  overflow:hidden;
  border-bottom:1px solid rgba(255,255,255,.15);
}

#tele-wrapper{
  overflow:hidden;
  white-space:nowrap;
  width:100%;
}

#tele-track{
  display:inline-block;
  white-space:nowrap;
  will-change:transform;
}

/* Espacio para que no tape el contenido */
body{
  padding-top:60px;
}

/* Degradado en bordes */
#teleprompter::before,
#teleprompter::after{
  content:"";
  position:absolute;
  top:0;
  width:60px;
  height:100%;
  pointer-events:none;
}

#teleprompter::before{
  left:0;
  background:linear-gradient(to right, rgba(0,0,0,.95), transparent);
}

#teleprompter::after{
  right:0;
  background:linear-gradient(to left, rgba(0,0,0,.95), transparent);
}
</style>
</head>

<body>
<!-- TELEPROMPTER -->
<div id="teleprompter">
  <div id="tele-wrapper">
    <div id="tele-track">Cargando sugerencias...</div>
  </div>
</div>
<header>
  <img src="img/french99.jpg" alt="Tilo Café">
</header>

<div class="banner" id="banner-text">¡Bienvenidos a Tilo Café French!</div>

<div id="languageSwitcher">
  <button id="btn-es" class="lang-btn">🇪🇸 Español</button>
  <button id="btn-en" class="lang-btn">🇬🇧 English</button>
  <button id="btn-pt" class="lang-btn">🇧🇷 Português</button>
</div>

<div class="search-box">
  <input id="search" type="text" placeholder="Buscar por nombre, descripción o categoría...">
  <button id="btnSearch">Buscar</button>
  <button id="btnVoice">🎤</button>
</div>

<div id="category-buttons"></div>
<div id="product-list"></div>
<button id="btnUp">⬆️</button>

<script>
document.addEventListener('DOMContentLoaded', () => {

const USER = 'tilo-restocafe';
const REPO = 'cartafrench';
let idiomaActual = localStorage.getItem('idioma') || 'es';

const btnEs = document.getElementById('btn-es');
const btnEn = document.getElementById('btn-en');
const btnPt = document.getElementById('btn-pt');
const banner = document.getElementById('banner-text');
const categoryContainer = document.getElementById('category-buttons');
const productList = document.getElementById('product-list');
const searchInput = document.getElementById('search');
const btnSearch = document.getElementById('btnSearch');
const btnVoice = document.getElementById('btnVoice');  
const btnUp = document.getElementById('btnUp');
const teleTrack = document.getElementById("tele-track");

let productos = [];

/* ================= TELEPROMPTER ================= */

function saludoSegunHora(){
  const hora = new Date().getHours();

  if(idiomaActual==="es"){
    if(hora<12) return "☀️ Buenos días";
    if(hora<19) return "🌤️ Buenas tardes";
    return "🌙 Buenas noches";
  }
  if(idiomaActual==="en"){
    if(hora<12) return "☀️ Good morning";
    if(hora<19) return "🌤️ Good afternoon";
    return "🌙 Good evening";
  }
  if(idiomaActual==="pt"){
    if(hora<12) return "☀️ Bom dia";
    if(hora<19) return "🌤️ Boa tarde";
    return "🌙 Boa noite";
  }
}

async function cargarTeleprompter(){
  try{
    const res = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/sugerencias.json`,{cache:"no-store"});
    const data = await res.json();
    const sugerencias = data[idiomaActual] || [];

    const textoFinal = saludoSegunHora()+" — "+sugerencias.join("   ✦   ");

    teleTrack.innerHTML = textoFinal + "   ✦   " + textoFinal;

    iniciarScroll();

  }catch{
    teleTrack.textContent="Bienvenidos a Tilo Café ☕";
  }
}

function iniciarScroll(){
  const velocidad = 60;
  const ancho = teleTrack.offsetWidth / 2;
  const duracion = ancho / velocidad;

  teleTrack.style.animation = "none";

  setTimeout(()=>{
    teleTrack.style.animation = `scrollTele ${duracion}s linear infinite`;
  },50);
}

const style = document.createElement("style");
style.innerHTML = `
@keyframes scrollTele{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}`;
document.head.appendChild(style);

/* ================= FUNCIONES ORIGINALES ================= */

function scrollToProducts(){
  const yOffset = -20;
  const y = productList.getBoundingClientRect().top + window.pageYOffset + yOffset;
  window.scrollTo({ top:y, behavior:"smooth" });
}

function limpiarTexto(texto){
  return texto.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

/* CARGAR PRODUCTOS */
async function load(){

  actualizarBotones();

  let archivo="productos.json";
  if(idiomaActual==="en") archivo="productos-en.json";
  if(idiomaActual==="pt") archivo="productos-port.json";

  const URL=`https://raw.githubusercontent.com/${USER}/${REPO}/main/${archivo}`;

  try{
    const res=await fetch(URL,{cache:"no-store"});
    const data=await res.json();

    productos=data.map(p=>({
      nombre:p.nombre||p.name||p.nome,
      descripcion:p.descripcion||p.description||p.descricao,
      precio:p.precio||p.price||p.preco,
      imagen:p.imagen||p.image||p.imagem,
      categoria:p.categoria||p.category
    }));

    renderCategorias();
    render(productos);
    cargarTeleprompter();   // 👈 ACÁ ESTABA LO QUE FALTABA

  }catch{
    productList.innerHTML=`<div class="msg">⚠️ No se pudieron cargar los productos.</div>`;
  }
}

/* RENDER */
function render(arr){
  productList.innerHTML="";
  if(arr.length===0){
    productList.innerHTML=`<div class="msg">🔍 No se encontraron resultados.</div>`;
    return;
  }
  arr.forEach(p=>{
    productList.innerHTML+=`
      <div class="item">
        <img src="${p.imagen}" alt="${p.nombre}">
        <h3>${p.nombre}</h3>
        <p>${p.descripcion||""}</p>
        <span class="price">$${p.precio}</span>
      </div>`;
  });
}

function renderCategorias(){
  const categorias=["Todos",...new Set(productos.map(p=>p.categoria).filter(Boolean))];
  categoryContainer.innerHTML="";
  categorias.forEach(cat=>{
    const btn=document.createElement("button");
    btn.textContent=cat;
    btn.onclick=()=>{
      if(cat==="Todos") render(productos);
      else render(productos.filter(p=>p.categoria===cat));
      scrollToProducts();
    };
    categoryContainer.appendChild(btn);
  });
}

/* BUSCADOR */
function filtrar(){
  const texto=limpiarTexto(searchInput.value);
  return productos.filter(p=>{
    return limpiarTexto(p.nombre||"").includes(texto) ||
           limpiarTexto(p.descripcion||"").includes(texto) ||
           limpiarTexto(p.categoria||"").includes(texto);
  });
}

searchInput.addEventListener("input",()=>render(filtrar()));
btnSearch.addEventListener("click",()=>{ render(filtrar()); scrollToProducts(); });
searchInput.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    render(filtrar());
    scrollToProducts();
  }
});
/* ================= BUSQUEDA POR VOZ ================= */

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {

  const recognition = new SpeechRecognition();
  function idiomaVoz(){
  if(idiomaActual==="es") return "es-AR";// español argentina
  if(idiomaActual==="en") return "en-US";
  if(idiomaActual==="pt") return "pt-BR";
}
recognition.lang = idiomaVoz();
  recognition.continuous = false;
  recognition.interimResults = false;

  btnVoice.addEventListener("click", () => {
    recognition.start();
    btnVoice.textContent = "🎙️";
  });

  recognition.addEventListener("result", (event) => {
    const textoVoz = event.results[0][0].transcript;
    
    searchInput.value = textoVoz;
    render(filtrar());
    scrollToProducts();

    btnVoice.textContent = "🎤";
  });

  recognition.addEventListener("end", () => {
    btnVoice.textContent = "🎤";
  });

} else {
  btnVoice.style.display = "none";
}  

/* IDIOMA */
function actualizarBotones(){
  btnEs.classList.toggle("active",idiomaActual==="es");
  btnEn.classList.toggle("active",idiomaActual==="en");
  btnPt.classList.toggle("active",idiomaActual==="pt");

  if(idiomaActual==="es") banner.textContent="¡Bienvenidos a Tilo Café French!";
  if(idiomaActual==="en") banner.textContent="Welcome to Tilo Café French!";
  if(idiomaActual==="pt") banner.textContent="Bem-vindo ao Tilo Café French!";
}

btnEs.onclick=()=>{idiomaActual="es";localStorage.setItem("idioma","es");load();};
btnEn.onclick=()=>{idiomaActual="en";localStorage.setItem("idioma","en");load();};
btnPt.onclick=()=>{idiomaActual="pt";localStorage.setItem("idioma","pt");load();};

/* BOTÓN SUBIR */
window.addEventListener("scroll",()=>{
  btnUp.style.display=window.scrollY>300?"block":"none";
});
btnUp.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});

load();

});
</script>

</body>
</html>
