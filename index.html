<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tilo Café French</title>

<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:url("img/Fondo1.jpg") repeat;
  background-size:cover;
  margin:0;
  padding-top:60px;
  text-align:center;
  color:#45270a;
}
function scrollToProducts() {
  const yOffset = -70; // compensación por el teleprompter fijo
  const y = productList.getBoundingClientRect().top + window.pageYOffset + yOffset;

  window.scrollTo({
    top: y,
    behavior: "smooth"
  });
}
/* ================= TELEPROMPTER ================= */

#teleprompter{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:rgba(0,0,0,.92);
  color:#fff;
  z-index:2000;
  padding:12px 16px;
  overflow:hidden;
  font-family:Georgia,serif;
}

#tele-wrapper{
  overflow:hidden;
  white-space:nowrap;
  width:100%;
}

#tele-track{
  display:inline-block;
  white-space:nowrap;
  will-change:transform;
}

@keyframes scrollText{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* ================= HEADER ================= */

header img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.banner{
  background:rgba(255,255,255,.85);
  padding:10px;
  font-size:1.3em;
  border-radius:8px;
  display:inline-block;
  margin:10px auto;
}

/* ================= RESTO ORIGINAL ================= */

#languageSwitcher{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px 0;
}

.lang-btn{
  background:#806250;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}

.lang-btn.active{
  background:#a07b68;
}

.search-box{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px;
}

.search-box input{
  padding:10px;
  width:60%;
  border-radius:8px;
  border:1px solid #ccc;
}

.search-box button{
  background:#806250;
  color:white;
  border:none;
  border-radius:8px;
  padding:10px 16px;
  cursor:pointer;
}

#category-buttons{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin:15px;
}

#category-buttons button{
  background:#8c6954;
  color:white;
  border:none;
  border-radius:10px;
  padding:8px 14px;
  cursor:pointer;
}

#product-list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.item{
  background:rgba(255,255,255,.95);
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
  overflow:hidden;
}

.item img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}

.price{
  font-weight:bold;
  margin:8px;
  display:block;
}

#btnUp{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#8c6954;
  color:white;
  border:none;
  border-radius:50%;
  width:45px;
  height:45px;
  font-size:22px;
  display:none;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- TELEPROMPTER -->
<div id="teleprompter">
  <div id="tele-wrapper">
    <div id="tele-track">Cargando sugerencias...</div>
  </div>
</div>

<header>
  <img src="img/french99.jpg" alt="Tilo Café French">
</header>

<div class="banner">¡Bienvenidos a Tilo Café French!</div>

<div id="languageSwitcher">
  <button id="btn-es" class="lang-btn">🇪🇸 Español</button>
  <button id="btn-en" class="lang-btn">🇬🇧 English</button>
  <button id="btn-pt" class="lang-btn">🇧🇷 Português</button>
</div>

<div class="search-box">
  <input id="search" type="text" placeholder="Buscar...">
  <button id="btnSearch">Buscar</button>
</div>

<div id="category-buttons"></div>
<div id="product-list"></div>
<button id="btnUp">⬆️</button>

<script>
document.addEventListener('DOMContentLoaded', () => {

  /* ================= AUTO DETECCIÓN ================= */

  const USER   = location.hostname.split('.')[0];
  const REPO   = location.pathname.split('/')[1];
  const BRANCH = "main";

  let idiomaActual = localStorage.getItem('idioma') || 'es';

  const btnEs = document.getElementById('btn-es');
  const btnEn = document.getElementById('btn-en');
  const btnPt = document.getElementById('btn-pt');
  const banner = document.querySelector('.banner');
  const categoryContainer = document.getElementById('category-buttons');
  const productList = document.getElementById('product-list');
  const searchInput = document.getElementById('search');
  const btnSearch = document.getElementById('btnSearch');
  const btnUp = document.getElementById('btnUp');

  /* ================= TELEPROMPTER ================= */

  const tele = document.getElementById("tele-track");
  let sugerencias = [];

  function iniciarTeleprompter() {
    if (!sugerencias.length) return;

    const separador = "   ✦   ";
    const texto = sugerencias.join(separador) + separador;

    tele.textContent = texto + texto;

    requestAnimationFrame(() => {
      const ancho = tele.scrollWidth / 2;
      const velocidad = 75;
      const duracion = ancho / velocidad;

      tele.style.animation = "scrollText linear infinite";
      tele.style.animationDuration = duracion + "s";
    });
  }

  async function cargarSugerencias() {
    const URL = `https://raw.githubusercontent.com/${USER}/${REPO}/${BRANCH}/sugerencias.json`;

    try {
      const res = await fetch(URL, { cache: "no-store" });
      if (!res.ok) throw new Error();

      const data = await res.json();
      sugerencias = data[idiomaActual] || ["Bienvenidos ☕"];
      iniciarTeleprompter();

    } catch {
      sugerencias = ["Bienvenidos ☕"];
      iniciarTeleprompter();
    }
  }

  /* ================= PRODUCTOS ================= */

  let productos = [];

  function actualizarBotones() {
    btnEs.classList.toggle('active', idiomaActual === 'es');
    btnEn.classList.toggle('active', idiomaActual === 'en');
    btnPt.classList.toggle('active', idiomaActual === 'pt');

    if (idiomaActual === 'es') banner.textContent = "¡Bienvenidos a Tilo Café French!";
    if (idiomaActual === 'en') banner.textContent = "Welcome to Tilo Café French!";
    if (idiomaActual === 'pt') banner.textContent = "Bem-vindo ao Tilo Café French!";
  }

  async function load() {
    actualizarBotones();
    cargarSugerencias(); // 🔥 ahora se actualiza también el teleprompter

    let filename = "productos.json";
    if (idiomaActual === "en") filename = "productos-en.json";
    if (idiomaActual === "pt") filename = "productos-port.json";

    const RAW_URL = `https://raw.githubusercontent.com/${USER}/${REPO}/${BRANCH}/${filename}`;

    try {
      const res = await fetch(RAW_URL, { cache: "no-store" });
      if (!res.ok) throw new Error();

      const data = await res.json();

      productos = data.map(p => ({
        nombre:
          idiomaActual === "es" ? (p.nombre || p.nome) :
          idiomaActual === "en" ? (p.name || p.nome) :
          p.nome,

        descripcion:
          idiomaActual === "es" ? (p.descripcion || p.descricao) :
          idiomaActual === "en" ? (p.description || p.descricao) :
          p.descricao,

        precio: p.precio || p.preco || p.price,
        imagen: p.imagen || p.imagem || p.image,
        categoria:
          idiomaActual === "es" ? p.categoria :
          idiomaActual === "en" ? (p.category || p.categoria) :
          p.categoria
      }));

      renderCategories();
      renderProducts("Todos");

    } catch {
      productList.innerHTML = `<div class="msg">⚠️ No se pudieron cargar los productos.</div>`;
    }
  }

  function renderCategories() {
    const categorias = ["Todos", ...new Set(productos.map(p => p.categoria).filter(Boolean))];
    categoryContainer.innerHTML = "";
    categorias.forEach(cat => {
      const btn = document.createElement("button");
      btn.textContent = cat;
      btn.addEventListener("click", () => renderProducts(cat));
      categoryContainer.appendChild(btn);
    });
  }

  function renderProducts(categoria) {
    productList.innerHTML = "";
    const lista = categoria === "Todos"
      ? productos
      : productos.filter(p => p.categoria === categoria);

    lista.forEach(p => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <img src="${p.imagen}" alt="${p.nombre}">
        <h3>${p.nombre}</h3>
        <p>${p.descripcion || ""}</p>
        <span class="price">$${p.precio}</span>`;
      productList.appendChild(div);
    });
  }

  function buscar() {
    const q = searchInput.value.toLowerCase().trim();
    const res = productos.filter(p =>
      p.nombre.toLowerCase().includes(q) ||
      (p.descripcion || "").toLowerCase().includes(q)
    );
    renderProducts("Todos");
  }

  /* ================= EVENTOS ================= */

  btnEs.onclick = () => { idiomaActual = "es"; localStorage.setItem("idioma","es"); load(); };
  btnEn.onclick = () => { idiomaActual = "en"; localStorage.setItem("idioma","en"); load(); };
  btnPt.onclick = () => { idiomaActual = "pt"; localStorage.setItem("idioma","pt"); load(); };

  btnSearch.onclick = buscar;

  window.addEventListener("scroll", () => {
    btnUp.style.display = window.scrollY > 300 ? "block" : "none";
  });

  btnUp.onclick = () => window.scrollTo({ top:0, behavior:"smooth" });

  /* ================= INICIAR ================= */

  load();

});
</script>

</body>
</html>
